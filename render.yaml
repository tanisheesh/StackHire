services:
  # Telegram Bot Service
  - type: web
    name: stackhire-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: stackhire-db
          property: connectionString
      - key: OPERATOR_CHAT_ID
        sync: false
      - key: SCRAPER_INTERVAL_HOURS
        value: 6
      - key: BOT_USERNAME
        value: StackHireBot
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

  # Next.js Landing Page
  - type: web
    name: stackhire-web
    runtime: node
    buildCommand: cd web && npm install && npm run build
    startCommand: cd web && npm start
    envVars:
      - key: NEXT_PUBLIC_BOT_USERNAME
        value: StackHireBot

databases:
  - name: stackhire-db
    databaseName: jobbot
    user: jobbot
